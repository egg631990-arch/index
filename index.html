<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Цветы | Букеты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            width: 100%;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap');

        /* ===== ПОЛОСКА С МЕНЮ ===== */
        .top-bar {
            background: linear-gradient(95deg, #ff9eb5 0%, #ffe0e8 40%, #ffb6c7 100%);
            padding: 8px 20px;
            position: sticky;
            top: 0;
            z-index: 200;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .top-bar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Левая группа меню */
        .menu-group {
            display: flex;
            gap: 40px;
        }

        /* Каждый дропдаун */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px 0;
            letter-spacing: 0.03em;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #fff9f5;
            min-width: 200px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 10px 0;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .dropdown-content a {
            display: block;
            padding: 8px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: #4a3b2f;
            text-decoration: none;
            transition: 0.2s;
        }

        .dropdown-content a:hover {
            background-color: #ffe0d4;
            color: #b45f3b;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* Правый блок "Связь" */
        .contact-right {
            text-align: right;
            font-family: 'Montserrat', sans-serif;
        }

        .contact-right .contact-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        .contact-right .phone {
            font-size: 0.85rem;
            color: #fff4e6;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .contact-right .email {
            font-size: 0.75rem;
            color: #fff0e0;
            word-break: break-all;
        }

        .contact-right .sub-contact {
            margin-top: 8px;
            font-size: 0.7rem;
            color: #ffe6d9;
        }

        /* Основной контент */
        .main {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            flex: 1;
        }

        .section {
            scroll-margin-top: 70px;
        }

        .top-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin: 0;
            padding: 0;
            gap: 0;
        }

        .flower-left {
            flex: 1;
            text-align: left;
            margin: 0;
            padding: 0;
            line-height: 0;
            margin-left: -20px;
        }
        .flower-left img {
            display: block;
            width: auto;
            max-width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            margin-left: -18px;
            transition: transform 0.25s ease;
            cursor: pointer;
        }

        .flower-right {
            flex: 1;
            text-align: right;
            margin: 0;
            padding: 0;
            line-height: 0;
        }
        .flower-right img {
            display: inline-block;
            width: 50%;
            max-width: 50%;
            height: auto;
            margin: 0;
            padding: 0;
            transition: transform 0.25s ease;
            cursor: pointer;
        }

        .flower-center {
            text-align: center;
            margin: 0;
            margin-top: 20px;
            padding: 0;
            line-height: 0;
        }
        .flower-center img {
            display: inline-block;
            width: 33.333%;
            max-width: 33.333%;
            height: auto;
            transition: transform 0.25s ease;
            cursor: pointer;
        }

        .text-block {
            text-align: center;
            margin: 40px 20px 50px 20px;
            padding: 15px 0;
        }

        .main-title {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #2d2d2a;
        }

        .main-title .slash {
            font-weight: 400;
            color: #b87c5a;
            margin: 0 6px;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, #b87c5a 0%, #d9a77a 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        @keyframes gentleShake {
            0% { transform: translate(0,0) rotate(0deg); }
            20% { transform: translate(-1px, 0.5px) rotate(0.2deg); }
            40% { transform: translate(1px, -0.3px) rotate(-0.2deg); }
            60% { transform: translate(-0.5px, 0.8px) rotate(0.1deg); }
            80% { transform: translate(0.5px, -0.2px) rotate(-0.1deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .shake-on-scroll {
            animation: gentleShake 0.4s ease-in-out forwards;
        }

        @media (hover: hover) {
            .flower-left img:hover,
            .flower-right img:hover,
            .flower-center img:hover {
                transform: scale(1.05);
            }
        }
        .flower-left img:active,
        .flower-right img:active,
        .flower-center img:active {
            transform: scale(1.04);
        }

        #order-section, #contact-section {
            min-height: 1px;
            background: transparent;
        }

        /* большой прямоугольник внизу */
        .big-footer-rect {
            width: 100%;
            background-color: #232333;
            min-height: 280px;
            margin-top: 60px;
        }

        @media (max-width: 900px) {
            .top-bar-container {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .menu-group {
                justify-content: center;
                gap: 30px;
                flex-wrap: wrap;
            }
            .contact-right {
                text-align: center;
            }
        }

        @media (max-width: 768px) {
            .dropbtn { font-size: 0.85rem; }
            .dropdown-content { min-width: 170px; }
            .flower-left { margin-left: -25px; }
            .flower-left img { margin-left: -20px; }
            .flower-right img { width: 52%; }
            .flower-center img { width: 40%; }
            .main-title { font-size: 42px; }
            .subtitle { font-size: 20px; }
            .text-block { margin: 30px 15px 40px; }
            .big-footer-rect { min-height: 200px; margin-top: 40px; }
        }

        @media (max-width: 480px) {
            .flower-left { margin-left: -30px; }
            .flower-left img { margin-left: -22px; }
            .flower-right img { width: 55%; }
            .flower-center img { width: 45%; }
            .main-title { font-size: 32px; }
            .subtitle { font-size: 18px; }
            .big-footer-rect { min-height: 160px; margin-top: 30px; }
        }

        @media (min-width: 1024px) {
            .flower-left { margin-left: -30px; }
            .flower-left img { margin-left: -20px; }
        }

        img {
            border-radius: 0;
            box-shadow: none;
            border: none;
        }
    </style>
</head>
<body>

<!-- Верхняя полоска с меню "О нас", "Клиентам" и блоком "Связь" -->
<div class="top-bar">
    <div class="top-bar-container">
        <div class="menu-group">
            <!-- О нас -->
            <div class="dropdown">
                <button class="dropbtn">О нас</button>
                <div class="dropdown-content">
                    <a>О нас</a>
                    <a>Доставка</a>
                    <a>Оплата</a>
                    <a>Соц Сети</a>
                </div>
            </div>
            <!-- Клиентам -->
            <div class="dropdown">
                <button class="dropbtn">Клиентам</button>
                <div class="dropdown-content">
                    <a>Контакты</a>
                    <a>Помощь</a>
                    <a>Политика конфидициальности</a>
                    <a>Условия покупки</a>
                    <a>Помощь по букетам</a>
                    <a>Скидки</a>
                </div>
            </div>
        </div>

        <!-- Правый блок "Связь" -->
        <div class="contact-right">
            <div class="contact-title">Связь</div>
            <div class="phone">+790000000000</div>
            <div class="sub-contact">Вопросы/сотрудничество</div>
            <div class="email">gmail@gmail.com</div>
        </div>
    </div>
</div>

<div class="main">
    <section id="home-section" class="section">
        <div class="top-line">
            <div class="flower-left">
                <img src="цветы1.png" alt="цветы1" class="flower-img">
            </div>
            <div class="flower-right">
                <img src="цветы3.png" alt="цветы3" class="flower-img">
            </div>
        </div>

        <div class="text-block">
            <div class="main-title">
                Цветы<span class="slash">/</span>Букеты
            </div>
            <div class="subtitle">
                на заказ
            </div>
        </div>

        <div class="flower-center">
            <img src="цветы4.png" alt="цветы4" class="flower-img">
        </div>
    </section>

    <section id="order-section" class="section"></section>
    <section id="contact-section" class="section"></section>
</div>

<div class="big-footer-rect"></div>

<script>
    const images = document.querySelectorAll('.flower-img');
    let ticking = false;
    let lastScroll = window.scrollY;

    function shake() {
        images.forEach(img => {
            img.classList.remove('shake-on-scroll');
            void img.offsetWidth;
            img.classList.add('shake-on-scroll');
            setTimeout(() => img.classList.remove('shake-on-scroll'), 450);
        });
    }

    window.addEventListener('scroll', () => {
        if (!ticking) {
            requestAnimationFrame(() => {
                if (window.scrollY !== lastScroll) {
                    shake();
                    lastScroll = window.scrollY;
                }
                ticking = false;
            });
            ticking = true;
        }
    });

    const navBtns = document.querySelectorAll('.nav-item');
    const homeSec = document.getElementById('home-section');
    const orderSec = document.getElementById('order-section');
    const contactSec = document.getElementById('contact-section');

    function updateActive() {
        if (!homeSec || !orderSec || !contactSec) return;
        const scrollPos = window.scrollY + 100;
        const homeTop = homeSec.offsetTop;
        const orderTop = orderSec.offsetTop;
        const contactTop = contactSec.offsetTop;

        let active = 'home';
        if (scrollPos >= contactTop - 50) active = 'contact';
        else if (scrollPos >= orderTop - 60) active = 'order';
        else active = 'home';

        if (navBtns.length) {
            navBtns.forEach(btn => {
                if (btn.dataset.section === active) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
    }

    function scrollToSection(sectionId) {
        let target;
        if (sectionId === 'home') target = homeSec;
        else if (sectionId === 'order') target = orderSec;
        else target = contactSec;

        if (target) {
            const offset = 65;
            const pos = target.getBoundingClientRect().top + window.scrollY;
            window.scrollTo({ top: pos - offset, behavior: 'smooth' });
            setTimeout(updateActive, 150);
        }
    }

    if (navBtns.length) {
        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                scrollToSection(btn.dataset.section);
            });
        });
    }

    window.addEventListener('scroll', () => requestAnimationFrame(updateActive));
    window.addEventListener('load', updateActive);
    updateActive();
    setTimeout(shake, 200);
</script>
</body>
</html>
