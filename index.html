<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Контейнер */
        .container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Верхняя строка: слева и справа */
        .top-row {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .left {
            flex: 1;
            text-align: left;
            min-width: 200px;
        }

        .right {
            flex: 1;
            text-align: right;
            min-width: 200px;
        }

        /* Нижний центр */
        .center-bottom {
            text-align: center;
        }

        /* Стили картинок */
        img {
            max-width: 100%;
            height: auto;
            display: inline-block;
            border-radius: 0;
            box-shadow: none;
        }

        /* На мобилках: лево и право по центру */
        @media (max-width: 700px) {
            .top-row {
                flex-direction: column;
                align-items: center;
                gap: 40px;
            }
            .left, .right {
                text-align: center;
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Верхняя часть: слева цветы1, справа цветы3 -->
    <div class="top-row">
        <div class="left">
            <!-- Фотка цветы1.png из той же папки -->
            <img src="цветы1.png" alt="цветы1">
        </div>
        <div class="right">
            <!-- Фотка цветы3.png из той же папки -->
            <img src="цветы3.png" alt="цветы3">
        </div>
    </div>

    <!-- Ниже в центре: цветы4 -->
    <div class="center-bottom">
        <img src="цветы4.png" alt="цветы4">
    </div>
</div>
</body>
</html>
