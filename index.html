<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Цветы | Левая в край, всё вверху</title>
    <style>
        /* Полный сброс — никаких отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            /* Убираем вообще все отступы у body */
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* Главный контейнер — без отступов, строго к краям */
        .main {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
        }

        /* Верхняя часть: строка с цветы1 (слева в край) и цветы3 (справа) */
        .top-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin: 0;
            padding: 0;
            /* Никаких gap, чтобы фотка слева встала плотно к левому краю */
            gap: 0;
        }

        /* ----- ЦВЕТЫ1 — ПРИЖАТА В САМЫЙ ЛЕВЫЙ КРАЙ БЕЗ ОТСТУПОВ ----- */
        .flower-left {
            flex: 1;
            text-align: left;
            margin: 0;
            padding: 0;
            line-height: 0;  /* убирает лишние пробелы под картинкой */
        }
        .flower-left img {
            display: block;
            width: auto;
            max-width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            transform-origin: left center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ----- ЦВЕТЫ3 — ПРИЖАТА В ПРАВЫЙ КРАЙ, УМЕНЬШЕНА В 2 РАЗА ----- */
        .flower-right {
            flex: 1;
            text-align: right;
            margin: 0;
            padding: 0;
            line-height: 0;
        }
        .flower-right img {
            display: inline-block;
            width: 50%;           /* в 2 раза меньше */
            max-width: 50%;
            height: auto;
            margin: 0;
            padding: 0;
            transform-origin: right center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ----- ЦВЕТЫ4 — УМЕНЬШЕНА В 3 РАЗА, ПО ЦЕНТРУ, НО ВВЕРХУ (под верхней строкой) ----- */
        .flower-center {
            text-align: center;
            margin: 0;
            margin-top: 20px;    /* небольшой отступ от верхних фото, но всё равно в верхней зоне */
            padding: 0;
            line-height: 0;
        }
        .flower-center img {
            display: inline-block;
            width: 33.333%;       /* ровно в 3 раза меньше */
            max-width: 33.333%;
            height: auto;
            transform-origin: center center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ---------- ЭФФЕКТ ПРИ НАВЕДЕНИИ / КАСАНИИ ---------- */
        @media (hover: hover) {
            .flower-left img:hover,
            .flower-right img:hover,
            .flower-center img:hover {
                transform: scale(1.08);
            }
        }

        /* Для телефонов: касание увеличивает, без залипаний */
        .flower-left img:active,
        .flower-right img:active,
        .flower-center img:active {
            transform: scale(1.07);
            transition: transform 0.1s ease;
        }

        /* ===== ОПТИМИЗАЦИЯ ПОД ТЕЛЕФОНЫ: все фото наверху, левая строго у края ===== */
        @media (max-width: 768px) {
            body {
                padding: 0;
                margin: 0;
            }
            .main {
                padding: 0 0 20px 0;
            }
            /* убираем любые возможные отступы у контейнеров */
            .top-line {
                margin: 0;
                padding: 0;
                gap: 0;
            }
            /* цветы1 — прижата в самый-самый левый край экрана */
            .flower-left {
                margin: 0;
                padding: 0;
            }
            .flower-left img {
                margin-left: 0;
                padding-left: 0;
                max-width: 100%;
            }
            /* цветы3 — прижата вправо без отступа */
            .flower-right {
                margin: 0;
                padding: 0;
            }
            .flower-right img {
                margin-right: 0;
                padding-right: 0;
            }
            /* Нижняя фотка (цветы4) поднята наверх — следует сразу после цветы3 */
            .flower-center {
                margin-top: 18px;
                margin-bottom: 0;
                padding: 0;
            }
            
            /* На телефонах возможно, цветы3 станет чуть шире для комфорта, но сохраняем пропорцию ~в 2 раза */
            .flower-right img {
                width: 52%;
                max-width: 52%;
            }
            /* для очень узких экранов сохраняем логику */
        }

        /* Дополнительная подстройка для совсем маленьких телефонов (iPhone SE, 375px) */
        @media (max-width: 480px) {
            .flower-right img {
                width: 55%;
                max-width: 55%;
            }
            .flower-center img {
                width: 40%;     /* адаптивно, но все еще маленькая (меньше чем в 2.5 раза) */
                max-width: 40%;
            }
            .flower-center {
                margin-top: 15px;
            }
        }

        /* Убираем любые скругления, рамки, тени — только чистые фото */
        img {
            border-radius: 0;
            box-shadow: none;
            border: none;
            background: transparent;
        }

        /* Гарантия, что левая картинка всегда у самого края без микросдвигов */
        .flower-left {
            display: flex;
            justify-content: flex-start;
        }
        .flower-left img {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="main">
    <!-- Верхняя строка: цветы1 максимально слева, цветы3 максимально справа -->
    <div class="top-line">
        <div class="flower-left">
            <img src="цветы1.png" alt="цветы1">
        </div>
        <div class="flower-right">
            <img src="цветы3.png" alt="цветы3">
        </div>
    </div>
    <!-- Фотка цветы4: по центру, но находится сразу под верхней строкой (вверху) -->
    <div class="flower-center">
        <img src="цветы4.png" alt="цветы4">
    </div>
</div>
</body>
</html>
