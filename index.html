<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Цветы | ПК + телефон: максимально влево</title>
    <style>
        /* Полный сброс — никаких отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            width: 100%;
            overflow-x: hidden;    /* скрываем вылезание только по горизонтали, чтобы не было полосы прокрутки */
        }

        body {
            min-height: 100vh;
        }

        /* Главный контейнер — на всю ширину */
        .main {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            overflow: visible;
        }

        /* Верхняя строка: цветы1 + цветы3 */
        .top-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin: 0;
            padding: 0;
            gap: 0;
            position: relative;
            overflow: visible;
        }

        /* ----- ЦВЕТЫ1: СДВИГ ВЛЕВО НА ДВА ШАГА (ОТРИЦАТЕЛЬНЫЕ MARGIN) ДЛЯ ВСЕХ УСТРОЙСТВ ----- */
        .flower-left {
            flex: 1;
            text-align: left;
            margin: 0;
            padding: 0;
            line-height: 0;
            position: relative;
            /* ПЕРВЫЙ ШАГ ВЛЕВО: отрицательный margin у родителя */
            margin-left: -20px;
        }
        .flower-left img {
            display: block;
            width: auto;
            max-width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            /* ВТОРОЙ ШАГ ВЛЕВО: отрицательный margin у самой картинки */
            margin-left: -18px;
            transform-origin: left center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ----- ЦВЕТЫ3: прижата вправо, уменьшена в 2 раза ----- */
        .flower-right {
            flex: 1;
            text-align: right;
            margin: 0;
            padding: 0;
            line-height: 0;
        }
        .flower-right img {
            display: inline-block;
            width: 50%;
            max-width: 50%;
            height: auto;
            margin: 0;
            padding: 0;
            transform-origin: right center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ----- ЦВЕТЫ4: уменьшена в 3 раза, по центру, вверху ----- */
        .flower-center {
            text-align: center;
            margin: 0;
            margin-top: 20px;
            padding: 0;
            line-height: 0;
        }
        .flower-center img {
            display: inline-block;
            width: 33.333%;
            max-width: 33.333%;
            height: auto;
            transform-origin: center center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ---------- ЭФФЕКТ ПРИ НАВЕДЕНИИ / КАСАНИИ ---------- */
        @media (hover: hover) {
            .flower-left img:hover,
            .flower-right img:hover,
            .flower-center img:hover {
                transform: scale(1.08);
            }
        }

        .flower-left img:active,
        .flower-right img:active,
        .flower-center img:active {
            transform: scale(1.07);
            transition: transform 0.1s ease;
        }

        /* ===== ДЛЯ ТЕЛЕФОНОВ: УСИЛИВАЕМ СДВИГ (тех же 2 шага, но побольше) ===== */
        @media (max-width: 768px) {
            .flower-left {
                margin-left: -28px;   /* первый шаг на телефонах больше */
            }
            .flower-left img {
                margin-left: -22px;   /* второй шаг больше */
            }
            .flower-right img {
                width: 52%;
                max-width: 52%;
            }
            .flower-center {
                margin-top: 18px;
            }
        }

        /* Для очень маленьких телефонов (iPhone SE, 375px) — дополнительное смещение */
        @media (max-width: 480px) {
            .flower-left {
                margin-left: -35px;
            }
            .flower-left img {
                margin-left: -25px;
            }
            .flower-right img {
                width: 55%;
                max-width: 55%;
            }
            .flower-center img {
                width: 40%;
                max-width: 40%;
            }
        }

        /* ===== ДЛЯ ПК (ШИРОКИЕ ЭКРАНЫ) — ТОЖЕ СДВИГАЕМ НА ДВА ШАГА, НО УМЕРЕННО ===== */
        @media (min-width: 1024px) {
            .flower-left {
                margin-left: -30px;   /* первый шаг на ПК */
            }
            .flower-left img {
                margin-left: -20px;   /* второй шаг на ПК */
            }
        }

        /* Для больших мониторов (чтоб не терялся эффект) */
        @media (min-width: 1440px) {
            .flower-left {
                margin-left: -40px;
            }
            .flower-left img {
                margin-left: -25px;
            }
        }

        /* Убираем всё лишнее */
        img {
            border-radius: 0;
            box-shadow: none;
            border: none;
            background: transparent;
        }

        .flower-left {
            display: flex;
            justify-content: flex-start;
            overflow: visible;
        }
        .flower-left img {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="main">
    <div class="top-line">
        <div class="flower-left">
            <img src="цветы1.png" alt="цветы1">
        </div>
        <div class="flower-right">
            <img src="цветы3.png" alt="цветы3">
        </div>
    </div>
    <div class="flower-center">
        <img src="цветы4.png" alt="цветы4">
    </div>
</div>
</body>
</html>
