<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Цветы | Букеты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            width: 100%;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap');

        /* ===== РОЗОВАЯ ПОЛОСКА ===== */
        .navbar {
            background: linear-gradient(95deg, #ff9eb5 0%, #ffe0e8 40%, #ffb6c7 100%);
            padding: 8px 16px;
            box-shadow: 0 2px 8px rgba(255, 105, 130, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .nav-container {
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: baseline;
        }

        .nav-item {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 4px 0;
            background: transparent;
            border: none;
        }

        .nav-item.active {
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff4e6;
            text-shadow: 0 0 5px rgba(210, 60, 90, 0.3);
        }

        .nav-item:hover {
            transform: translateY(-1px);
        }

        /* Основной контент */
        .main {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            flex: 1;
        }

        .section {
            scroll-margin-top: 70px;
        }

        /* Фотки */
        .top-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin: 0;
            padding: 0;
            gap: 0;
        }

        .flower-left {
            flex: 1;
            text-align: left;
            margin: 0;
            padding: 0;
            line-height: 0;
            margin-left: -20px;
        }
        .flower-left img {
            display: block;
            width: auto;
            max-width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            margin-left: -18px;
            transition: transform 0.25s ease;
            cursor: pointer;
        }

        .flower-right {
            flex: 1;
            text-align: right;
            margin: 0;
            padding: 0;
            line-height: 0;
        }
        .flower-right img {
            display: inline-block;
            width: 50%;
            max-width: 50%;
            height: auto;
            margin: 0;
            padding: 0;
            transition: transform 0.25s ease;
            cursor: pointer;
        }

        .flower-center {
            text-align: center;
            margin: 0;
            margin-top: 20px;
            padding: 0;
            line-height: 0;
        }
        .flower-center img {
            display: inline-block;
            width: 33.333%;
            max-width: 33.333%;
            height: auto;
            transition: transform 0.25s ease;
            cursor: pointer;
        }

        .text-block {
            text-align: center;
            margin: 40px 20px 30px 20px;
            padding: 15px 0 0 0;
        }

        .main-title {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #2d2d2a;
        }

        .main-title .slash {
            font-weight: 400;
            color: #b87c5a;
            margin: 0 6px;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, #b87c5a 0%, #d9a77a 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* ===== КНОПКА КАТАЛОГ (ЕЩЁ БОЛЬШЕ) ===== */
        .buttons-row {
            display: flex;
            justify-content: center;
            margin: 30px 20px 50px 20px;
        }

        .action-btn {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #ffe0d4;
            color: #9b4a2a;
            border: 2px solid #ffcdb5;
            letter-spacing: 0.08em;
            /* Ещё больше: увеличиваем padding и шрифт */
            padding: 36px 90px;
            font-size: 2.8rem;
            border-radius: 80px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        /* Анимация при наведении */
        .action-btn:hover {
            transform: translateY(-6px);
            background: #ffdfd0;
            box-shadow: 0 16px 32px rgba(180, 95, 59, 0.3);
        }

        /* Анимация при нажатии */
        .action-btn:active {
            transform: scale(0.97);
            transition: transform 0.08s ease;
        }

        /* Дрожание */
        @keyframes gentleShake {
            0% { transform: translate(0,0) rotate(0deg); }
            20% { transform: translate(-1px, 0.5px) rotate(0.2deg); }
            40% { transform: translate(1px, -0.3px) rotate(-0.2deg); }
            60% { transform: translate(-0.5px, 0.8px) rotate(0.1deg); }
            80% { transform: translate(0.5px, -0.2px) rotate(-0.1deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .shake-on-scroll {
            animation: gentleShake 0.4s ease-in-out forwards;
        }

        @media (hover: hover) {
            .flower-left img:hover,
            .flower-right img:hover,
            .flower-center img:hover {
                transform: scale(1.05);
            }
        }
        .flower-left img:active,
        .flower-right img:active,
        .flower-center img:active {
            transform: scale(1.04);
        }

        #order-section, #contact-section {
            min-height: 1px;
            background: transparent;
        }

        /* ===== ЧЕРНЫЙ ПРЯМОУГОЛЬНИК ВНИЗУ ===== */
        .big-footer-rect {
            width: 100%;
            background-color: #232333;
            padding: 50px 30px 40px 30px;
            margin-top: 60px;
        }

        .footer-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 50px;
            font-family: 'Montserrat', sans-serif;
        }

        .footer-group {
            flex: 0 1 auto;
            min-width: 150px;
        }

        .footer-group h4 {
            color: #ffc6d3;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
            border-left: 3px solid #ff9eb5;
            padding-left: 10px;
        }

        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .footer-links .footer-item {
            color: #e0e0e0;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
            display: block;
        }

        .footer-links .footer-item:hover {
            color: #ffb6c7;
            transform: translateX(3px);
        }

        .contact-footer .phone-foot {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffd5df;
            margin-bottom: 8px;
        }

        .contact-footer .mail-foot {
            font-size: 0.8rem;
            color: #cbcbcb;
            word-break: break-all;
        }

        .sub-contact-foot {
            font-size: 0.7rem;
            color: #a0a0b0;
            margin: 8px 0 4px 0;
        }

        /* ===== ПЛАВАЮЩАЯ КНОПКА "ПОМОЩЬ" ===== */
        .help-button {
            position: fixed;
            bottom: 120px;
            right: 20px;
            z-index: 999;
            cursor: pointer;
            width: 70px;
            height: 70px;
            transition: transform 0.1s ease;
        }

        .help-button img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
        }

        .help-button:active {
            animation: helpClick 0.2s ease-in-out;
        }

        @keyframes helpClick {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.25); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .navbar { padding: 6px 12px; }
            .nav-container { gap: 32px; }
            .nav-item { font-size: 0.9rem; }
            .nav-item.active { font-size: 1.1rem; }
            .flower-left { margin-left: -25px; }
            .flower-left img { margin-left: -20px; }
            .flower-right img { width: 52%; }
            .flower-center img { width: 40%; }
            .main-title { font-size: 42px; }
            .subtitle { font-size: 20px; }
            .text-block { margin: 30px 15px 20px; }
            .buttons-row { margin: 20px 15px 40px; }
            .action-btn { padding: 22px 50px; font-size: 1.8rem; }
            .big-footer-rect { padding: 35px 20px; margin-top: 40px; }
            .footer-container { gap: 30px; }
            .footer-group { min-width: 130px; }
            .help-button { width: 65px; height: 65px; bottom: 130px; right: 15px; }
        }

        @media (max-width: 550px) {
            .footer-container { gap: 25px; }
            .footer-group { min-width: 120px; }
            .footer-group h4 { font-size: 0.85rem; }
            .footer-links .footer-item { font-size: 0.7rem; }
            .help-button { width: 55px; height: 55px; bottom: 120px; right: 12px; }
            .action-btn { padding: 16px 35px; font-size: 1.4rem; }
        }

        @media (max-width: 480px) {
            .flower-left { margin-left: -30px; }
            .flower-left img { margin-left: -22px; }
            .flower-right img { width: 55%; }
            .flower-center img { width: 45%; }
            .main-title { font-size: 32px; }
            .subtitle { font-size: 18px; }
            .big-footer-rect { padding: 30px 15px; margin-top: 30px; }
            .help-button { bottom: 110px; }
            .action-btn { padding: 14px 28px; font-size: 1.2rem; border-radius: 50px; }
        }

        @media (min-width: 1024px) {
            .flower-left { margin-left: -30px; }
            .flower-left img { margin-left: -20px; }
        }

        img {
            border-radius: 0;
            box-shadow: none;
            border: none;
        }
    </style>
</head>
<body>

<!-- Розовая полоска -->
<div class="navbar">
    <div class="nav-container">
        <button class="nav-item" data-section="home">главная</button>
        <button class="nav-item" data-section="order">заказ</button>
        <button class="nav-item" data-section="contact">контакт</button>
    </div>
</div>

<div class="main">
    <section id="home-section" class="section">
        <div class="top-line">
            <div class="flower-left">
                <img src="цветы1.png" alt="цветы1" class="flower-img">
            </div>
            <div class="flower-right">
                <img src="цветы3.png" alt="цветы3" class="flower-img">
            </div>
        </div>

        <div class="text-block">
            <div class="main-title">
                Цветы<span class="slash">/</span>Букеты
            </div>
            <div class="subtitle">
                на заказ
            </div>
        </div>

        <div class="flower-center">
            <img src="цветы4.png" alt="цветы4" class="flower-img">
        </div>

        <!-- Кнопка КАТАЛОГ (увеличена ещё больше) -->
        <div class="buttons-row">
            <button class="action-btn" id="catalogBtn">Каталог</button>
        </div>
    </section>

    <section id="order-section" class="section"></section>
    <section id="contact-section" class="section"></section>
</div>

<!-- Чёрный прямоугольник внизу -->
<div class="big-footer-rect">
    <div class="footer-container">
        <div class="footer-group">
            <h4>О нас</h4>
            <div class="footer-links">
                <div class="footer-item">О нас</div>
                <div class="footer-item">Доставка</div>
                <div class="footer-item">Оплата</div>
                <div class="footer-item">Соц Сети</div>
            </div>
        </div>

        <div class="footer-group">
            <h4>Клиентам</h4>
            <div class="footer-links">
                <div class="footer-item">Контакты</div>
                <div class="footer-item">Помощь</div>
                <div class="footer-item">Политика конфидициальности</div>
                <div class="footer-item">Условия покупки</div>
                <div class="footer-item">Помощь по букетам</div>
                <div class="footer-item">Скидки</div>
            </div>
        </div>

        <div class="footer-group">
            <h4>Связь</h4>
            <div class="footer-links contact-footer">
                <div class="phone-foot">+790000000000</div>
                <div class="sub-contact-foot">Вопросы/сотрудничество</div>
                <div class="mail-foot">gmail@gmail.com</div>
            </div>
        </div>
    </div>
</div>

<!-- Плавающая кнопка помощи -->
<div class="help-button" id="helpButton">
    <img src="помощь.png" alt="помощь" onerror="this.src='https://placehold.co/70x70/ff9eb5/white?text=помощь'">
</div>

<script>
    // Дрожание фоток
    const images = document.querySelectorAll('.flower-img');
    let ticking = false;
    let lastScroll = window.scrollY;

    function shake() {
        images.forEach(img => {
            img.classList.remove('shake-on-scroll');
            void img.offsetWidth;
            img.classList.add('shake-on-scroll');
            setTimeout(() => img.classList.remove('shake-on-scroll'), 450);
        });
    }

    window.addEventListener('scroll', () => {
        if (!ticking) {
            requestAnimationFrame(() => {
                if (window.scrollY !== lastScroll) {
                    shake();
                    lastScroll = window.scrollY;
                }
                ticking = false;
            });
            ticking = true;
        }
    });

    // Навигация (главная/заказ/контакт)
    const navBtns = document.querySelectorAll('.nav-item');
    const homeSec = document.getElementById('home-section');
    const orderSec = document.getElementById('order-section');
    const contactSec = document.getElementById('contact-section');

    function updateActive() {
        if (!homeSec || !orderSec || !contactSec) return;
        const scrollPos = window.scrollY + 100;
        const homeTop = homeSec.offsetTop;
        const orderTop = orderSec.offsetTop;
        const contactTop = contactSec.offsetTop;

        let active = 'home';
        if (scrollPos >= contactTop - 50) active = 'contact';
        else if (scrollPos >= orderTop - 60) active = 'order';
        else active = 'home';

        navBtns.forEach(btn => {
            if (btn.dataset.section === active) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function scrollToSection(sectionId) {
        let target;
        if (sectionId === 'home') target = homeSec;
        else if (sectionId === 'order') target = orderSec;
        else target = contactSec;

        if (target) {
            const offset = 65;
            const pos = target.getBoundingClientRect().top + window.scrollY;
            window.scrollTo({ top: pos - offset, behavior: 'smooth' });
            setTimeout(updateActive, 150);
        }
    }

    navBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            scrollToSection(btn.dataset.section);
        });
    });

    window.addEventListener('scroll', () => requestAnimationFrame(updateActive));
    window.addEventListener('load', updateActive);
    updateActive();
    setTimeout(shake, 200);

    // Кнопка помощи: анимация
    const helpBtn = document.getElementById('helpButton');
    helpBtn.addEventListener('click', () => {
        helpBtn.style.animation = 'none';
        setTimeout(() => { helpBtn.style.animation = ''; }, 10);
    });

    // Кнопка "Каталог" — открывает новую пустую страницу в той же вкладке
    const catalogBtn = document.getElementById('catalogBtn');
    catalogBtn.addEventListener('click', () => {
        // Создаём новую пустую HTML-страницу (белый экран)
        const blankDoc = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Каталог</title><style>body{margin:0;padding:0;background:#ffffff;width:100%;height:100vh;}</style></head><body></body></html>';
        const blob = new Blob([blankDoc], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        window.location.href = url;
        // Через секунду освобождаем URL (необязательно)
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        
        // Анимация нажатия
        catalogBtn.style.transform = 'scale(0.97)';
        setTimeout(() => { catalogBtn.style.transform = ''; }, 120);
    });
</script>
</body>
</html>
