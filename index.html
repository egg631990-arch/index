<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Цветы | Крайнее левое положение</title>
    <style>
        /* Полный сброс — абсолютно никаких отступов у body и html */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            width: 100%;
            overflow-x: hidden;    /* чтобы ничего не вылазило за пределы */
        }

        body {
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* Главный контейнер — без отступов, на всю ширину */
        .main {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
        }

        /* Верхняя строка: цветы1 (в левый край) и цветы3 (в правый край) */
        .top-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin: 0;
            padding: 0;
            gap: 0;
        }

        /* ----- ЦВЕТЫ1: МАКСИМАЛЬНО ВЛЕВО (вплотную к границе экрана) ----- */
        .flower-left {
            flex: 1;
            text-align: left;
            margin: 0;
            padding: 0;
            line-height: 0;
            /* Убираем любые возможные внутренние сдвиги */
            position: relative;
            left: 0;
        }
        .flower-left img {
            display: block;
            width: auto;
            max-width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            /* Прижимаем к самому краю: убираем любые отступы слева */
            margin-left: 0;
            transform-origin: left center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* Дополнительный приём: физически сдвигаем контейнер влево, если есть скрытые отступы */
        .flower-left {
            margin-left: 0 !important;
            padding-left: 0 !important;
        }

        /* ----- ЦВЕТЫ3: ПРИЖАТА ВПРАВЫЙ КРАЙ, УМЕНЬШЕНА В 2 РАЗА ----- */
        .flower-right {
            flex: 1;
            text-align: right;
            margin: 0;
            padding: 0;
            line-height: 0;
        }
        .flower-right img {
            display: inline-block;
            width: 50%;           /* в 2 раза меньше */
            max-width: 50%;
            height: auto;
            margin: 0;
            padding: 0;
            transform-origin: right center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ----- ЦВЕТЫ4: УМЕНЬШЕНА В 3 РАЗА, ПО ЦЕНТРУ, ВВЕРХУ ----- */
        .flower-center {
            text-align: center;
            margin: 0;
            margin-top: 20px;
            padding: 0;
            line-height: 0;
        }
        .flower-center img {
            display: inline-block;
            width: 33.333%;       /* ровно в 3 раза меньше */
            max-width: 33.333%;
            height: auto;
            transform-origin: center center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ---------- ЭФФЕКТ ПРИ НАВЕДЕНИИ / КАСАНИИ ---------- */
        @media (hover: hover) {
            .flower-left img:hover,
            .flower-right img:hover,
            .flower-center img:hover {
                transform: scale(1.08);
            }
        }

        /* Для телефонов и тач-устройств: увеличение по нажатию */
        .flower-left img:active,
        .flower-right img:active,
        .flower-center img:active {
            transform: scale(1.07);
            transition: transform 0.1s ease;
        }

        /* ===== ОПТИМИЗАЦИЯ ПОД ТЕЛЕФОНЫ И ПК: цветы1 ещё левее ===== */
        /* Для всех устройств: убираем абсолютно все возможные отступы у родителя */
        @media (max-width: 9999px) {
            .flower-left,
            .flower-left img {
                margin-left: 0 !important;
                padding-left: 0 !important;
                border-left: none !important;
            }
            /* Дополнительный "якорь" в самый угол: даже если браузер добавляет странный отступ */
            body > .main > .top-line > .flower-left {
                margin-left: -0.5px;  /* микро-сдвиг для борьбы с белой линией на некоторых экранах */
            }
        }

        /* Для телефонов — ещё жёстче прижимаем, убираем возможный gap от родительских элементов */
        @media (max-width: 768px) {
            body, html {
                overflow-x: hidden;
                margin: 0;
                padding: 0;
            }
            .main {
                padding: 0;
                margin: 0;
            }
            .top-line {
                margin: 0;
                padding: 0;
                gap: 0;
            }
            /* Цветы1: крайний левый без вариантов */
            .flower-left {
                margin: 0 !important;
                padding: 0 !important;
                text-align: left;
            }
            .flower-left img {
                margin-left: 0 !important;
                padding-left: 0 !important;
                max-width: 100%;
            }
            /* Цветы3: прижаты вправо */
            .flower-right {
                margin: 0 !important;
                padding: 0 !important;
            }
            .flower-right img {
                margin-right: 0;
                width: 52%;
                max-width: 52%;
            }
            /* Цветы4 наверху, подняты */
            .flower-center {
                margin-top: 18px;
            }
        }

        /* Доп. доводка для совсем маленьких телефонов (iPhone SE, 375px) */
        @media (max-width: 480px) {
            .flower-right img {
                width: 55%;
                max-width: 55%;
            }
            .flower-center img {
                width: 40%;
                max-width: 40%;
            }
            /* Усиленный сдвиг влево для цветы1 */
            .flower-left {
                margin-left: -1px !important;
            }
        }

        /* Для больших экранов (ПК) тоже гарантируем, что фото в левом краю */
        @media (min-width: 1024px) {
            .flower-left img {
                margin-left: 0;
            }
            .flower-left {
                margin-left: 0;
                padding-left: 0;
            }
            /* Микро-коррекция, если есть тень от body */
            body {
                padding: 0;
            }
        }

        /* Убираем всё лишнее: скругления, рамки, тени */
        img {
            border-radius: 0;
            box-shadow: none;
            border: none;
            background: transparent;
        }

        /* Гарантия, что левый блок flex-start без дополнительных смещений */
        .flower-left {
            display: flex;
            justify-content: flex-start;
        }
        .flower-left img {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="main">
    <!-- Верхняя строка: цветы1 прижата к левому краю, цветы3 — к правому -->
    <div class="top-line">
        <div class="flower-left">
            <img src="цветы1.png" alt="цветы1">
        </div>
        <div class="flower-right">
            <img src="цветы3.png" alt="цветы3">
        </div>
    </div>
    <!-- Цветы4 — по центру, но в верхней части экрана -->
    <div class="flower-center">
        <img src="цветы4.png" alt="цветы4">
    </div>
</div>
</body>
</html>
