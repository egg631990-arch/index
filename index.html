<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Цветы | Максимально влево</title>
    <style>
        /* Полный сброс — никаких отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            width: 100%;
            overflow-x: hidden;    /* скрываем возможное вылезание за правый край, но левое вылезание разрешено */
        }

        body {
            min-height: 100vh;
        }

        /* Главный контейнер — на всю ширину */
        .main {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            overflow: visible;     /* чтобы левый съезд был виден */
        }

        /* Верхняя строка: цветы1 (сдвигаем влево на 2 дополнительных шага) + цветы3 справа */
        .top-line {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin: 0;
            padding: 0;
            gap: 0;
            position: relative;
            overflow: visible;
        }

        /* ----- ЦВЕТЫ1: сдвигаем влево на 2 шага (сначала относительный сдвиг, потом еще margin-left) ----- */
        .flower-left {
            flex: 1;
            text-align: left;
            margin: 0;
            padding: 0;
            line-height: 0;
            position: relative;
            left: 0;
            /* Первый шаг влево: отрицательный отступ */
            margin-left: -15px;   /* первый сдвиг */
        }
        .flower-left img {
            display: block;
            width: auto;
            max-width: 100%;
            height: auto;
            margin: 0;
            padding: 0;
            /* Второй шаг влево: дополнительный отрицательный margin у самой картинки */
            margin-left: -12px;   /* второй сдвиг, итого -27px от исходного положения */
            transform-origin: left center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
            left: 0;
        }

        /* Усиление для телефонов и ПК: ещё левее */
        @media (max-width: 768px) {
            .flower-left {
                margin-left: -20px;   /* первый шаг на телефонах больше */
            }
            .flower-left img {
                margin-left: -18px;   /* второй шаг больше */
            }
        }

        /* Для очень маленьких экранов — сдвигаем еще чуть-чуть, чтобы точно было "ещё на два раза влево" */
        @media (max-width: 480px) {
            .flower-left {
                margin-left: -25px;
            }
            .flower-left img {
                margin-left: -22px;
            }
        }

        /* Для больших экранов (ПК) тоже сохраняем двойной сдвиг */
        @media (min-width: 1024px) {
            .flower-left {
                margin-left: -18px;
            }
            .flower-left img {
                margin-left: -14px;
            }
        }

        /* ----- ЦВЕТЫ3: прижата вправо, уменьшена в 2 раза ----- */
        .flower-right {
            flex: 1;
            text-align: right;
            margin: 0;
            padding: 0;
            line-height: 0;
        }
        .flower-right img {
            display: inline-block;
            width: 50%;
            max-width: 50%;
            height: auto;
            margin: 0;
            padding: 0;
            transform-origin: right center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ----- ЦВЕТЫ4: уменьшена в 3 раза, по центру, вверху ----- */
        .flower-center {
            text-align: center;
            margin: 0;
            margin-top: 20px;
            padding: 0;
            line-height: 0;
        }
        .flower-center img {
            display: inline-block;
            width: 33.333%;
            max-width: 33.333%;
            height: auto;
            transform-origin: center center;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        /* ---------- ЭФФЕКТ ПРИ НАВЕДЕНИИ / КАСАНИИ ---------- */
        @media (hover: hover) {
            .flower-left img:hover,
            .flower-right img:hover,
            .flower-center img:hover {
                transform: scale(1.08);
            }
        }

        .flower-left img:active,
        .flower-right img:active,
        .flower-center img:active {
            transform: scale(1.07);
            transition: transform 0.1s ease;
        }

        /* Адаптация под телефоны: всё наверху, цветы1 — максимально сдвинута влево */
        @media (max-width: 768px) {
            body, html {
                overflow-x: hidden;
            }
            .main {
                padding: 0;
            }
            .top-line {
                margin: 0;
                padding: 0;
            }
            .flower-right img {
                width: 52%;
                max-width: 52%;
            }
            .flower-center {
                margin-top: 18px;
            }
        }

        @media (max-width: 480px) {
            .flower-right img {
                width: 55%;
                max-width: 55%;
            }
            .flower-center img {
                width: 40%;
                max-width: 40%;
            }
        }

        /* Убираем всё лишнее */
        img {
            border-radius: 0;
            box-shadow: none;
            border: none;
            background: transparent;
        }

        .flower-left {
            display: flex;
            justify-content: flex-start;
            overflow: visible;
        }
        .flower-left img {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="main">
    <div class="top-line">
        <div class="flower-left">
            <img src="цветы1.png" alt="цветы1">
        </div>
        <div class="flower-right">
            <img src="цветы3.png" alt="цветы3">
        </div>
    </div>
    <div class="flower-center">
        <img src="цветы4.png" alt="цветы4">
    </div>
</div>
</body>
</html>
